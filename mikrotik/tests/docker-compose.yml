# RouterOS CHR 7.22 in QEMU + a test runner that talks to it on the Docker network.
# Run from anywhere with:
#
#   docker compose -f mikrotik/tests/docker-compose.yml run --rm tester
#
# or use ./mikrotik/tests/run.sh which adds log capture and cleanup.

name: pretty-useful-mikrotik

services:
  chr:
    build:
      context: ./chr
      dockerfile: Dockerfile
      args:
        ROUTEROS_VERSION: "${ROUTEROS_VERSION:-7.22}"
    image: pretty-useful-mikrotik-chr:${ROUTEROS_VERSION:-7.22}
    container_name: pretty-useful-mikrotik-chr
    platform: linux/amd64
    restart: "no"
    # Bind only to localhost on the host so a developer machine doesn't expose CHR.
    ports:
      - "127.0.0.1:8728:8728"
      - "127.0.0.1:2222:22"
      - "127.0.0.1:8080:80"
    # On Linux CI hosts with KVM, uncomment for ~10x faster boot:
    # devices:
    #   - /dev/kvm
    healthcheck:
      test: ["CMD", "nc", "-z", "-w", "1", "127.0.0.1", "8728"]
      interval: 5s
      timeout: 3s
      retries: 240          # 240 * 5s = up to 20 min, covers TCG-on-Rosetta first boot
      start_period: 30s

  tester:
    build:
      context: ./tester
      dockerfile: Dockerfile
    image: pretty-useful-mikrotik-tester:1
    container_name: pretty-useful-mikrotik-tester
    depends_on:
      chr:
        condition: service_healthy
    environment:
      ROUTEROS_HOST: "chr"
      ROUTEROS_PORT: "8728"
      ROUTEROS_USER: "${ROUTEROS_USER:-admin}"
      ROUTEROS_PASSWORD: "${ROUTEROS_PASSWORD:-}"
      ROUTEROS_WAIT_SEC: "${ROUTEROS_WAIT_SEC:-180}"
      EXPECT_ROUTEROS_VERSION: "${EXPECT_ROUTEROS_VERSION:-7.22}"
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    volumes:
      # Repo root is mounted read-only; tests read scripts from it.
      - ../../:/repo:ro
    working_dir: /repo
