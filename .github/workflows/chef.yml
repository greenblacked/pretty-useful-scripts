name: chef

on:
  push:
    branches: [master, dev]
    paths:
      - "test-env/chef/**"
      - ".github/workflows/chef.yml"
  pull_request:
    paths:
      - "test-env/chef/**"
      - ".github/workflows/chef.yml"

defaults:
  run:
    working-directory: test-env/chef

jobs:
  lint:
    name: cookstyle + yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: test-env/chef
      - run: bundle exec cookstyle --display-cop-names cookbooks
      - name: yamllint
        run: |
          pip install --quiet yamllint
          yamllint -c .yamllint .

  chefspec:
    name: chefspec (unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: test-env/chef
      - run: bundle exec rspec cookbooks
