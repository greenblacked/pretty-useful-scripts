name: python

on:
  push:
    branches: [master, dev]
    paths:
      - "test-env/python/**"
      - ".github/workflows/python.yml"
  pull_request:
    paths:
      - "test-env/python/**"
      - ".github/workflows/python.yml"

defaults:
  run:
    working-directory: test-env/python

jobs:
  lint-test:
    name: ruff + pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: test-env/python/pyproject.toml
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: ruff format --check .
      - run: pytest -q
